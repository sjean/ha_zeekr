# custom_components/zeekr/services.yaml

save_response:
  name: "Save Server Response"
  description: "Save the latest API server response to a JSON file"
  fields:
    filename:
      name: "Filename"
      description: "Filename to save as (default: response_YYYYMMDD_HHMMSS.json)"
      example: "manual_response.json"
      selector:
        text:
    description:
      name: "Description"
      description: "Description of the saved response"
      example: "Response while charging"
      selector:
        text:

refresh_and_save:
  name: "Refresh And Save"
  description: "Refresh vehicle data and save the server response"
  fields:
    description:
      name: "Description"
      description: "Description for the saved response"
      example: "Refresh while parked"
      selector:
        text:
